format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$shell\
$python\
$character
"""

[directory]
# style = "blue"
truncation_length = 5
truncate_to_repo = false
truncation_symbol = "ŌĆ”/"
before_repo_root_style = "cyan"
