unbind C-b
set -g prefix "C-a"

bind -r Tab last-window


# 'default' tells tmux to inherit your terminal's native bg/fg colors dynamically
set -g status-style "bg=default,fg=default"

# set -g status-interval 5
set -g window-status-separator ""

set -g mouse on

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# ------------------------------------------
# LEFT SIDE
# ------------------------------------------
# 'reverse' flips fg and bg. This creates a solid blue block, and forces the text to dynamically match your terminal's true background color
set -g status-left "#[fg=blue,bold] #S #[none] "
set -g status-left-length 20

# Inactive windows (Inherits your terminal's native text color perfectly)
set -g window-status-format "#[fg=default] #I:#W "
set -g window-status-last-style "fg=default,bold"

# Active window (Creates a solid green block that adapts beautifully to both modes)
set -g window-status-current-format "#[fg=green,bold] #I:#W #[none]"

# ------------------------------------------
# RIGHT SIDE: Hostname
# ------------------------------------------
# Standard blue text hostname that looks sharp on dark or white space
set -g status-right "#[fg=blue,bold] #H "
set -g status-right-length 40

set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'

run '~/.config/tmux/plugins/tpm/tpm
